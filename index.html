<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>AI八字数据分析 - MVP演示</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 20px auto; padding: 20px; background: #f4f4f9; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input, button { padding: 10px; margin: 5px 0; width: 100%; box-sizing: border-box; }
        button { background: #4682B4; color: white; border: none; cursor: pointer; font-size: 16px; }
        button:hover { background: #315f85; }
        #result { margin-top: 20px; display: none; }
        img { max-width: 100%; border-radius: 10px; margin-top: 10px; }
        .tag { display: inline-block; background: #eee; padding: 5px 10px; margin: 2px; border-radius: 4px; }
        .instruction{font-size: 10px; color: #666;}
    </style>
</head>
<body>

<div class="card">
    <h2>🔮 八字数据采集系统</h2>
    <p>输入你的出生时间，获取五行能量报告</p>
    <p class="instruction">以下需要输入的时间均为公历（阳历），时间为北京时间。请勿使用阴历</p>
    
    年<input type="number" id="year" placeholder="年 (公历年，如：2001)">
    月<input type="number" id="month" placeholder="公历月">
    日<input type="number" id="day" placeholder="公历日">
    时<input type="number" id="hour" placeholder="时 (0-23)">
    分<input type="number" id="minute" placeholder="分">
    
    <button onclick="analyze()">开始数据计算</button>
</div>

<div id="result" class="card">
    <h3>📊 分析报告</h3>
    <p><strong>八字排盘：</strong> <span id="bazi-text"></span></p>
    <p><strong>日主核心：</strong> <span id="day-master"></span></p>
    
    <div style="text-align: center;">
        <img id="chart-img" src="" alt="五行能量图">
    </div>
    
    <p style="color: #666; font-size: 12px; text-align: center; margin-top: 10px;">
        *该报告由 Python 算法自动生成
    </p>
</div>

<script>
    async function analyze() {
        const btn = document.querySelector('button');
        btn.innerText = "计算中...";
        
        // 1. 收集数据
        const payload = {
            year: document.getElementById('year').value,
            month: document.getElementById('month').value,
            day: document.getElementById('day').value,
            hour: document.getElementById('hour').value,
            minute: document.getElementById('minute').value
        };

        try {
            // 2. 调用刚才写的 Python API
            // http://127.0.0.1:5000/api/calculate
            const response = await fetch('http://127.0.0.1:5000/api/calculate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const json = await response.json();
            
            if (json.status === 'success') {
                const data = json.data;
                
                // 3. 把数据填到网页上
                document.getElementById('result').style.display = 'block';
                
                // 显示八字
                let baziStr = data.bazi.map(item => `<span class="tag">${item}</span>`).join(' ');
                document.getElementById('bazi-text').innerHTML = baziStr;
                
                // 显示日主
                document.getElementById('day-master').innerText = 
                    `${data.day_master} (${data.day_master_element}命)`;
                
                // 显示图片 (Base64)
                document.getElementById('chart-img').src = 
                    "data:image/png;base64," + data.chart_image;
            } else {
                alert("计算出错：" + json.message);
            }
        } catch (err) {
            alert("连接服务器失败，请确认 Python 脚本在运行！");
            console.error(err);
        }
        
        btn.innerText = "开始数据计算";
    }
</script>

</body>
</html>
